<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Apisync — API synchronization">
  <defs>
    <linearGradient id="as-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="as-hex-l" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#115e59"/>
      <stop offset="1" stop-color="#0a2e2b"/>
    </linearGradient>
    <linearGradient id="as-hex-r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0a2e2b"/>
    </linearGradient>
    <linearGradient id="as-overlap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#7ebab5"/>
    </linearGradient>
    <radialGradient id="as-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="as-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#as-bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#as-glow)"/>

  <!-- hex A (left) -->
  <g filter="url(#as-shadow)">
    <polygon points="192,104 310,160 310,352 192,408 74,352 74,160"
             fill="url(#as-hex-l)" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- hex B (right) -->
  <g>
    <polygon points="320,104 438,160 438,352 320,408 202,352 202,160"
             fill="url(#as-hex-r)" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- overlap zone bright highlight -->
  <polygon points="256,130 310,160 310,352 256,382 202,352 202,160"
           fill="url(#as-overlap)" fill-opacity="0.35" stroke="#14b8a6" stroke-opacity="0.7" stroke-width="2"/>

  <!-- sync arrows in overlap -->
  <g transform="translate(256 256)">
    <!-- left chevron -->
    <polygon points="8,-6 -8,0 8,6" fill="#14b8a6"/>
    <!-- right chevron -->
    <polygon points="-8,-6 8,0 -8,6" fill="#7ebab5"/>
    <!-- top chevron -->
    <polygon points="0,-18 -6,-10 0,-2 6,-10" fill="#14b8a6" opacity="0.7"/>
    <!-- bottom chevron -->
    <polygon points="0,18 -6,10 0,2 6,10" fill="#7ebab5" opacity="0.7"/>
  </g>

  <!-- connection nodes -->
  <g fill="#14b8a6">
    <circle cx="256" cy="160" r="6"/>
    <circle cx="256" cy="352" r="6"/>
  </g>

  <!-- label dots -->
  <g fill="#7ebab5" opacity="0.6">
    <circle cx="138" cy="140" r="4"/>
    <circle cx="138" cy="260" r="4"/>
    <circle cx="374" cy="140" r="4"/>
    <circle cx="374" cy="260" r="4"/>
  </g>
</svg>
