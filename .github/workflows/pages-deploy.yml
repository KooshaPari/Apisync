name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4

      - name: Build documentation index
        run: |
          mkdir -p _site
          cp -r docs/* _site/ 2>/dev/null || true
          if [ ! -f "_site/index.html" ] && [ -f "_site/README.md" ]; then
            echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=README.md"></head></html>' > _site/index.html
          elif [ ! -f "_site/index.html" ]; then
            echo "<html><body><h1>Apisync Documentation</h1><ul>" > _site/index.html
            find _site -name "*.md" -type f | sed 's|^_site/||' | while read f; do
              echo "<li><a href='$f'>$f</a></li>" >> _site/index.html
            done
            echo "</ul></body></html>" >> _site/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-24.04
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
