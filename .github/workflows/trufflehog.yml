name: TruffleHog Secrets Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        # Pinned to a release tag + SHA for reproducibility. Prior pin
        # (`75add79b...`, comment said "v-latest from @main") tracked main and is
        # brittle; pin to a concrete v3.x release instead.
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          path: ./
          base_depth: 100
          extra_args: --max-depth 1000 --concurrency 4
